services:
  backend:
    container_name: overload-backend
    build:
      context: ./api
      dockerfile: Dockerfile
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    env_file:
      - ./api/.env

  redis:
    container_name: overload-redis
    image: redis:7.0.11-alpine
    ports:
      - "6379:6379"

  db:
    container_name: overload-db
    image: postgres:18
    env_file:
      - api/.env
    volumes:
      - db_data:/var/lib/postgresql
      - ./db-init/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh:z

volumes:
  db_data: